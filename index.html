<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Restaurant Menu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styls.css">
</head>
<body>

<!-- 🔥 Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">
      <img src="photo/logo.jpeg" alt="">
    </a>

    <div>
      <a href="tel:01221545658" 
         target="_blank" 
         class="btn btn-success">
         Order now ☎️
      </a>
      <button
  id="themeToggle"
  class="btn btn-outline-warning ms-2"
  title="Dark Mode"
>
  🌙
</button>

    </div>  
  </div>
</nav>
<!-- ================= HERO SECTION ================= -->
<section class="hero">
  <div class="hero-overlay"></div>

  <div class="container hero-content">
    <div class="main-Hero row align-items-center">
      <div class="col-lg-6 text-center text-lg-start">
        <span class="hero-badge">🔥 Fresh & Tasty</span>

        <h1 class="hero-title">
          Taste the <span>Best</span><br />
          Burgers in Town
        </h1>

        <p class="hero-text">
          Delicious burgers, crispy chicken and fresh ingredients
          made with love just for you.
        </p>

        <div class="hero-actions">
          <a href="#menu" class="btn btn-success btn-lg">
            Order Now 🍔
          </a>

          <a href="tel:01221545658" class="btn btn-outline-light btn-lg">
            Call Us ☎️
          </a>
        </div>
      </div>

      <div class="hero-img-main col-lg-6 text-center  mt-lg-0 ">
        <img
          src="photo/Designer1.png"
          alt="Burger"
          class="hero-image"
        />
      </div>
    </div>
  </div>
</section>
<!-- 🔥 Main Dishes -->
<div class="container my-5">
  <h2 class="text-center mb-4">Main Dishes</h2>

  <div class="slider-wrapper">

    <button class="btn btn-dark position-absolute top-50 start-0 translate-middle-y z-1" id="prevBtn">
      ‹
    </button>
    <!-- Indicators -->
<div class="text-center mt-4" id="dotsContainer"></div>

<!-- Progress Bar -->
<div class="progress mt-3" style="height:4px;">
  <div id="progressBar" class="progress-bar bg-danger" style="width:0%"></div>
</div>
<!-- searchInput -->

<div class="container my-3">
  <input
    type="text"
    id="searchInput"
    class="form-control form-control-lg"
    placeholder="Search for food..."
  />
</div>
<div class="container my-3">
  <select id="priceRange" class="form-select form-select-lg">
    <option value="">💰 All prices</option>
    <option value="0-100">From 0 to 100 EGP</option>
    <option value="100-150">From 100 to 150 EGP</option>
    <option value="150-200">From 150 to 200 EGP</option>
    <option value="200-9999">200+ EGP</option>
  </select>
</div>
<!-- Play / Pause -->
<div class="text-center mt-3">
  <button id="toggleAuto" class="btn btn-outline-dark btn-sm">
    Pause
  </button>
</div>

    <div class="overflow-hidden">
      <div class="d-flex transition" id="cardSlider">

<div class="overflow-hidden">
  <div class="d-flex" id="cardSlider">
    <!-- CARDS AUTO GENERATED FROM JSON -->
  </div>
</div>

      </div>
    </div>

    <button class="btn btn-dark position-absolute top-50 end-0 translate-middle-y z-1" id="nextBtn">
      ›
    </button>


<!-- 🔥 Desserts -->


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
